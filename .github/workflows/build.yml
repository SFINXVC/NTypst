name: Build & Pack

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rid: linux-x64
            lib: libtypst_native.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            rid: linux-arm64
            lib: libtypst_native.so
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            rid: osx-x64
            lib: libtypst_native.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            rid: osx-arm64
            lib: libtypst_native.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rid: win-x64
            lib: typst_native.dll
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            rid: win-arm64
            lib: typst_native.dll

    runs-on: ${{ matrix.os }}
    name: native (${{ matrix.rid }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build native library
        working-directory: native
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: native/target/${{ matrix.target }}/release/${{ matrix.lib }}
          if-no-files-found: error

  pack:
    needs: build-native
    runs-on: ubuntu-latest
    name: Pack NuGet

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place native libraries into runtimes
        run: |
          mkdir -p runtimes/{linux-x64,linux-arm64,osx-x64,osx-arm64,win-x64,win-arm64}/native
          cp artifacts/native-linux-x64/libtypst_native.so   runtimes/linux-x64/native/
          cp artifacts/native-linux-arm64/libtypst_native.so  runtimes/linux-arm64/native/
          cp artifacts/native-osx-x64/libtypst_native.dylib   runtimes/osx-x64/native/
          cp artifacts/native-osx-arm64/libtypst_native.dylib  runtimes/osx-arm64/native/
          cp artifacts/native-win-x64/typst_native.dll         runtimes/win-x64/native/
          cp artifacts/native-win-arm64/typst_native.dll       runtimes/win-arm64/native/

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: dotnet pack -c Release --no-build -o nupkgs

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*.nupkg

  publish:
    needs: pack
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish NuGet

    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: nupkgs

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Push to NuGet
        run: dotnet nuget push nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
